<!-- Load static files for CSS -->
{% load static %}

<!-- Standard HTML5 document structure -->
<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic meta tags for character encoding and responsiveness -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page title -->
    <title>Delete Author - LMS</title>

    <!-- Link to custom CSS file -->
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>

<body class="body-bg font-sans min-h-screen text-white">
    <!-- Navigation bar with glass morphism effect -->
    <nav class="nav">
        <div class="nav-container">
            <!-- Logo section -->
            <div class="logo">
                <div class="logo-icon">
                    <svg width="40" height="40" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" class="logo-svg">
                        <defs>
                            <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#4caf50;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#81c784;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                        <polygon points="16,4 28,16 16,28 4,16" fill="url(#neonGradient)" />
                    </svg>
                </div>
                <span class="logo-text"><a href="{% url 'home' %}" class="logo-link">LMS</a></span>
            </div>

            <!-- Center navigation links -->
            <ul class="nav-links">
                <li><a href="{% url 'home' %}" class="nav-link">Home</a></li>
                <li><a href="{% url 'book_list' %}" class="nav-link">Books</a></li>
                <li><a href="{% url 'admin_dashboard' %}" class="nav-link">Admin Dashboard</a></li>
            </ul>

            <!-- Right side auth links -->
            <div class="auth-links">
                {% if request.user.is_authenticated %}
                    <a href="{% url 'profile' %}" class="auth-link profile-link">Profile</a>
                    <a href="{% url 'logout' %}" class="btn logout-btn">Logout</a>
                {% else %}
                    <a href="{% url 'login' %}" class="auth-link login-link">Login</a>
                    <a href="{% url 'register' %}" class="btn signup-btn">Sign Up</a>
                {% endif %}
            </div>

            <!-- Mobile menu button -->
            <div class="mobile-menu-btn">
                <button class="mobile-menu-button">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M3 12H21M3 6H21M3 18H21" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main content area -->
    <main class="main">
        <div class="container">
            <!-- Page header -->
            <div class="page-header">
                <h1 class="page-title">
                    Delete <span class="gradient-text">Author</span>
                </h1>
                <p class="page-subtitle">Are you sure you want to delete "{{ author.name }}"?</p>
            </div>

            <!-- Confirmation form -->
            <section class="form-section">
                <form method="post" class="form">
                    {% csrf_token %}
                    <p>This action cannot be undone.</p>
                    <button type="submit" class="btn delete-btn">Yes, Delete</button>
                    <a href="{% url 'author_list' %}" class="btn logout-btn">Cancel</a>
                </form>
            </section>
        </div>
    </main>
</body>
</html>
